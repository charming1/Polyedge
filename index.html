<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PolyEdge — AI Bet Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#080810;color:#e8e8f0;font-family:'DM Mono',monospace;min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(rgba(0,255,148,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,148,0.025) 1px,transparent 1px);
    background-size:36px 36px;pointer-events:none;
  }
  #root{position:relative;z-index:1;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{width:36px;height:36px;border:2px solid #2a2a3d;border-top-color:#00ff94;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0a0a0f;} ::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// Uses our own Netlify function — no CORS issues ever
async function fetchMarkets() {
  const res = await fetch("/.netlify/functions/markets", {
    signal: AbortSignal.timeout(15000)
  });
  if (!res.ok) throw new Error(`Server error ${res.status} — function may still be deploying, try again in 1 minute`);
  return await res.json();
}

async function fetchMarketBySlug(slug) {
  try {
    const res = await fetch(`/.netlify/functions/markets?slug=${encodeURIComponent(slug)}`, {
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) return null;
    const data = await res.json();
    return Array.isArray(data) ? data[0] : data;
  } catch { return null; }
}

function analyzeMarket(m) {
  try {
    const prices = JSON.parse(m.outcomePrices || "[0.5,0.5]").map(Number);
    const labels = JSON.parse(m.outcomes || '["Yes","No"]');
    const bestIdx = prices.indexOf(Math.max(...prices));
    const bestPrice = prices[bestIdx];
    const bestOutcome = labels[bestIdx];

    let score = 0;
    const flags = [];

    if (bestPrice >= 0.90) { score += 45; flags.push(`${Math.round(bestPrice*100)}% confidence`); }
    else if (bestPrice >= 0.80) { score += 35; flags.push(`${Math.round(bestPrice*100)}% confidence`); }
    else if (bestPrice >= 0.70) { score += 22; flags.push(`${Math.round(bestPrice*100)}% confidence`); }
    else if (bestPrice >= 0.60) { score += 10; flags.push(`${Math.round(bestPrice*100)}% confidence`); }

    const vol = parseFloat(m.volume || 0);
    if (vol > 1000000) { score += 25; flags.push(`$${(vol/1000000).toFixed(1)}M vol`); }
    else if (vol > 500000) { score += 20; flags.push(`$${(vol/1000).toFixed(0)}k vol`); }
    else if (vol > 100000) { score += 12; flags.push(`$${(vol/1000).toFixed(0)}k vol`); }
    else if (vol > 10000) { score += 5; flags.push(`$${(vol/1000).toFixed(0)}k vol`); }

    const liq = parseFloat(m.liquidity || 0);
    if (liq > 100000) { score += 15; flags.push(`$${(liq/1000).toFixed(0)}k liq`); }
    else if (liq > 20000) { score += 8; flags.push(`$${(liq/1000).toFixed(0)}k liq`); }

    if (m.endDate) {
      const days = Math.round((new Date(m.endDate) - new Date()) / 86400000);
      if (days >= 0 && days <= 2) { score += 15; flags.push(`closes in ${days}d`); }
      else if (days <= 7) { score += 8; flags.push(`closes in ${days}d`); }
      else if (days > 0) flags.push(`${days}d left`);
    }

    if (score < 30) return null;
    return {
      id: m.id || m.slug,
      question: m.question,
      bestOutcome,
      probability: Math.round(bestPrice * 100),
      score: Math.min(score, 100),
      flags,
      slug: m.slug || "",
      endDate: m.endDate,
    };
  } catch { return null; }
}

function getLabel(score) {
  if (score >= 80) return { text: "Strong", cls: "strong", color: "#00ff94" };
  if (score >= 55) return { text: "Good", cls: "good", color: "#22d3ee" };
  return { text: "Moderate", cls: "moderate", color: "#f59e0b" };
}

const STORAGE_KEY = "polyedge-history-v2";
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function saveHistory(h) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); } catch {}
}

function App() {
  const [tab, setTab] = useState("scan");
  const [filter, setFilter] = useState("all");
  const [markets, setMarkets] = useState([]);
  const [history, setHistory] = useState(loadHistory);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [error, setError] = useState("");
  const [lastUpdated, setLastUpdated] = useState(null);
  const [checkingResults, setCheckingResults] = useState(false);

  const stats = (() => {
    const resolved = history.filter(h => h.result !== "pending");
    const won = resolved.filter(h => h.result === "won").length;
    const lost = resolved.filter(h => h.result === "lost").length;
    const winRate = resolved.length ? Math.round((won / resolved.length) * 100) : 0;
    return { total: history.length, won, lost, winRate };
  })();

  const checkPendingResults = useCallback(async (hist) => {
    const pending = hist.filter(h => h.result === "pending" && h.slug);
    if (!pending.length) return hist;
    setCheckingResults(true);
    let updated = [...hist];
    for (const item of pending) {
      try {
        const market = await fetchMarketBySlug(item.slug);
        if (!market || (!market.closed && !market.resolved)) continue;
        let winner = null;
        try {
          const prices = JSON.parse(market.outcomePrices || "[0.5,0.5]").map(Number);
          const labels = JSON.parse(market.outcomes || '["Yes","No"]');
          const winIdx = prices.findIndex(p => p >= 0.99);
          if (winIdx >= 0) winner = labels[winIdx];
        } catch {}
        if (winner) {
          const result = winner.toLowerCase() === item.bestOutcome.toLowerCase() ? "won" : "lost";
          updated = updated.map(h => h.id === item.id ? { ...h, result, resolvedAt: new Date().toISOString(), winner } : h);
        }
      } catch {}
    }
    setCheckingResults(false);
    return updated;
  }, []);

  useEffect(() => {
    if (history.length > 0) {
      checkPendingResults(history).then(updated => {
        setHistory(updated);
        saveHistory(updated);
      });
    }
  }, []);

  const scan = async () => {
    setLoading(true);
    setError("");
    setMarkets([]);
    try {
      setLoadingMsg("Connecting to Polymarket...");
      const data = await fetchMarkets();
      setLoadingMsg(`Analyzing ${data.length} markets...`);
      await new Promise(r => setTimeout(r, 200));
      const results = data.map(analyzeMarket).filter(Boolean);
      results.sort((a, b) => b.score - a.score);
      setMarkets(results);
      setLastUpdated(new Date());
      const existingIds = new Set(history.map(h => h.id));
      const newEntries = results.filter(r => !existingIds.has(r.id)).map(r => ({ ...r, scannedAt: new Date().toISOString(), result: "pending" }));
      if (newEntries.length) {
        const updated = [...newEntries, ...history].slice(0, 200);
        setHistory(updated);
        saveHistory(updated);
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  };

  const clearHistory = () => {
    if (window.confirm("Clear all history?")) { setHistory([]); saveHistory([]); }
  };

  const filtered = filter === "all" ? markets : markets.filter(m => getLabel(m.score).cls === filter);

  const S = {
    card: (c) => ({ background: "#12121a", border: "1px solid #2a2a3d", borderLeft: `3px solid ${c}`, borderRadius: 12, padding: 14 }),
    surface2: { background: "#1a1a26", borderRadius: 7, padding: "8px 10px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" },
    tag: (c) => ({ fontSize: 9, padding: "2px 9px", background: `${c}18`, border: `1px solid ${c}44`, borderRadius: 20, color: c, letterSpacing: 1, textTransform: "uppercase", fontWeight: 600 }),
    signal: { fontSize: 9, padding: "2px 7px", background: "rgba(124,58,237,0.1)", border: "1px solid rgba(124,58,237,0.2)", borderRadius: 20, color: "#a78bfa" },
    link: { display: "block", textAlign: "center", padding: 7, border: "1px solid #2a2a3d", borderRadius: 7, color: "#6b6b8a", fontSize: 10, textDecoration: "none", letterSpacing: 1, textTransform: "uppercase" },
    btn: (active) => ({ flex: 1, padding: "7px 4px", background: active ? "rgba(0,255,148,0.06)" : "#12121a", border: `1px solid ${active ? "#00ff94" : "#2a2a3d"}`, color: active ? "#00ff94" : "#6b6b8a", fontFamily: "DM Mono,monospace", fontSize: 9, letterSpacing: 1, textTransform: "uppercase", borderRadius: 8, cursor: "pointer" }),
    tab: (active) => ({ flex: 1, padding: 10, border: `1px solid ${active ? "#7c3aed" : "#2a2a3d"}`, background: active ? "rgba(124,58,237,0.1)" : "#12121a", color: active ? "#a78bfa" : "#6b6b8a", fontFamily: "DM Mono,monospace", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", borderRadius: 8, cursor: "pointer" }),
  };

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 14px" }}>

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 22 }}>
        <span style={{ fontFamily: "Syne,sans-serif", fontSize: 30, fontWeight: 800, letterSpacing: -1, background: "linear-gradient(135deg,#00ff94,#00c9ff)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Poly</span>
        <span style={{ fontFamily: "Syne,sans-serif", fontSize: 30, fontWeight: 800, letterSpacing: -1, background: "linear-gradient(135deg,#7c3aed,#ec4899)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Edge</span>
        <div style={{ fontSize: 10, color: "#6b6b8a", letterSpacing: 3, textTransform: "uppercase", marginTop: 2 }}>AI Bet Analyzer</div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6, marginBottom: 18, background: "#12121a", border: "1px solid #2a2a3d", borderRadius: 12, padding: 12 }}>
        {[
          { val: stats.total, label: "Analysed", color: "#e8e8f0" },
          { val: stats.won, label: "Won", color: "#00ff94" },
          { val: stats.lost, label: "Lost", color: "#ef4444" },
          { val: stats.winRate + "%", label: "Win Rate", color: stats.winRate >= 60 ? "#00ff94" : stats.winRate >= 40 ? "#f59e0b" : "#ef4444" },
        ].map((s, i) => (
          <div key={i} style={{ textAlign: "center" }}>
            <div style={{ fontFamily: "Syne,sans-serif", fontSize: 18, fontWeight: 800, color: s.color }}>{s.val}</div>
            <div style={{ fontSize: 9, color: "#6b6b8a", letterSpacing: 1, textTransform: "uppercase" }}>{s.label}</div>
          </div>
        ))}
      </div>

      {checkingResults && <div style={{ textAlign: "center", fontSize: 10, color: "#7c3aed", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>⟳ Checking bet results...</div>}

      {/* Tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <button onClick={() => setTab("scan")} style={S.tab(tab === "scan")}>🔍 Scan</button>
        <button onClick={() => setTab("history")} style={S.tab(tab === "history")}>📋 History ({history.length})</button>
      </div>

      {tab === "scan" && <>
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {["all","strong","good","moderate"].map(f => (
            <button key={f} onClick={() => setFilter(f)} style={S.btn(filter === f)}>{f}</button>
          ))}
        </div>

        <button onClick={scan} disabled={loading} style={{ width: "100%", padding: 15, background: loading ? "#1a1a26" : "linear-gradient(135deg,#7c3aed,#4f46e5)", border: "none", borderRadius: 12, color: "white", fontFamily: "Syne,sans-serif", fontSize: 15, fontWeight: 700, letterSpacing: 1, cursor: loading ? "not-allowed" : "pointer", marginBottom: 18, opacity: loading ? 0.7 : 1 }}>
          {loading ? loadingMsg : "⚡ SCAN LIVE MARKETS"}
        </button>

        {loading && <div style={{ textAlign: "center", padding: "20px 0" }}><div className="spinner"/><div style={{ fontSize: 11, color: "#6b6b8a", letterSpacing: 2, textTransform: "uppercase" }}>{loadingMsg}</div></div>}
        {lastUpdated && !loading && <div style={{ textAlign: "center", fontSize: 10, color: "#6b6b8a", marginBottom: 12 }}>Updated {lastUpdated.toLocaleTimeString()} · {filtered.length} markets</div>}
        {error && <div style={{ background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 12, padding: 16, textAlign: "center", marginBottom: 14, color: "#ef4444", fontSize: 12, lineHeight: 1.7 }}>⚠️ {error}</div>}

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.map((m, i) => {
            const lbl = getLabel(m.score);
            return (
              <div key={m.id} style={{ ...S.card(lbl.color), animation: `fadeUp 0.35s ease ${i*0.04}s both` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8, gap: 8 }}>
                  <span style={S.tag(lbl.color)}>{lbl.text}</span>
                  <span style={{ fontFamily: "Syne,sans-serif", fontSize: 20, fontWeight: 800, color: lbl.color }}>{m.score}</span>
                </div>
                <div style={{ fontFamily: "Syne,sans-serif", fontSize: 12, fontWeight: 600, lineHeight: 1.4, marginBottom: 10 }}>{m.question}</div>
                <div style={S.surface2}>
                  <span style={{ fontSize: 9, color: "#6b6b8a", textTransform: "uppercase", letterSpacing: 1 }}>Bet on</span>
                  <span style={{ fontFamily: "Syne,sans-serif", fontSize: 14, fontWeight: 700, color: "#00ff94" }}>{m.bestOutcome}</span>
                </div>
                <div style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#6b6b8a", marginBottom: 4 }}>
                    <span>Probability</span><span>{m.probability}%</span>
                  </div>
                  <div style={{ height: 3, background: "#2a2a3d", borderRadius: 3, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${m.probability}%`, background: `linear-gradient(90deg,#7c3aed,${lbl.color})`, borderRadius: 3 }}/>
                  </div>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10 }}>
                  {m.flags.map((f,j) => <span key={j} style={S.signal}>{f}</span>)}
                </div>
                <a href={`https://polymarket.com/event/${m.slug}`} target="_blank" rel="noreferrer" style={S.link}>View on Polymarket →</a>
              </div>
            );
          })}
        </div>
        {markets.length > 0 && filtered.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#6b6b8a", fontSize: 12 }}>No markets match this filter.</div>}
      </>}

      {tab === "history" && <>
        {history.length > 0 && <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
          <button onClick={clearHistory} style={{ background: "transparent", border: "1px solid #2a2a3d", color: "#6b6b8a", fontSize: 10, padding: "5px 12px", borderRadius: 6, cursor: "pointer", fontFamily: "DM Mono,monospace" }}>Clear History</button>
        </div>}
        {history.length === 0
          ? <div style={{ textAlign: "center", padding: 60, color: "#6b6b8a", fontSize: 12, lineHeight: 2 }}>No history yet.<br/>Run a scan to start tracking.</div>
          : <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {history.map((h, i) => {
                const lbl = getLabel(h.score);
                const rc = h.result === "won" ? "#00ff94" : h.result === "lost" ? "#ef4444" : "#6b6b8a";
                const ri = h.result === "won" ? "✓ WON" : h.result === "lost" ? "✗ LOST" : "⏳ PENDING";
                return (
                  <div key={i} style={{ background: "#12121a", border: `1px solid ${h.result === "won" ? "rgba(0,255,148,0.2)" : h.result === "lost" ? "rgba(239,68,68,0.2)" : "#2a2a3d"}`, borderLeft: `3px solid ${rc}`, borderRadius: 12, padding: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={S.tag(rc)}>{ri}</span>
                      <span style={{ fontSize: 9, color: "#6b6b8a" }}>{new Date(h.scannedAt).toLocaleDateString()}</span>
                    </div>
                    <div style={{ fontFamily: "Syne,sans-serif", fontSize: 11, fontWeight: 600, lineHeight: 1.4, marginBottom: 8 }}>{h.question}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#6b6b8a", marginBottom: 4 }}>
                      <span>Predicted: <span style={{ color: "#00ff94" }}>{h.bestOutcome}</span></span>
                      <span>Score: <span style={{ color: lbl.color }}>{h.score}</span></span>
                    </div>
                    {h.result !== "pending" && h.winner && <div style={{ fontSize: 10, color: "#6b6b8a", marginBottom: 6 }}>Actual: <span style={{ color: rc }}>{h.winner}</span></div>}
                    <a href={`https://polymarket.com/event/${h.slug}`} target="_blank" rel="noreferrer" style={{ ...S.link, marginTop: 8, fontSize: 9 }}>View Market →</a>
                  </div>
                );
              })}
            </div>
        }
      </>}

      <div style={{ marginTop: 24, padding: 10, textAlign: "center", fontSize: 9, color: "#3a3a55", letterSpacing: 1, lineHeight: 1.8 }}>
        DATA FROM POLYMARKET · NOT FINANCIAL ADVICE<br/>NEVER BET MORE THAN YOU CAN AFFORD TO LOSE
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
